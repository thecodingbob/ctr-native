[General]
; Set to true to skip all boot intros
; (SCEA Presents, Copyright, Naughty Dog)
skip_intro = false

[Adventure]
; Set to true to skip mask hints in adventure mode
skip_hints = false
; Set to true to open all adventure mode wood gates without keys
unlock_all_gates = false
; Set to true to unlock all warp pads and boss garages in adventure mode
unlock_all_portals = false

[Vehicle]
; Speed stat multiplier in percent (100 = default, in-game range 10-200)
speed_stat_multiplier = 100
; Gravity stat multiplier in percent (100 = default, in-game range 10-300)
gravity_stat_multiplier = 100
; Turn stat multiplier in percent (100 = default, in-game range 10-400)
turn_stat_multiplier = 100
; Jump stat multiplier in percent (100 = default, in-game range 10-300)
jump_stat_multiplier = 100

[Graphics]
; Set to true to increase viewing distance (3x default)
increase_draw_distance = false
; Set to true to use high-detail character models in 3-4P split screen
disable_split_screen_lod = false